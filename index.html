        <h1>Cursive — Professional Self-Publishing, an Imprint of OakBridge</h1>
        <p>
          Cursive helps authors turn a finished manuscript, a lifetime of memories, or even
          just an idea into a beautifully published book. As an imprint of OakBridge, we bring
          over 30 years of publishing expertise to editing, design, printing, and distribution —
          so your story reaches readers in the form it deserves.
        </p>

        <h2>Publishing services</h2>
        <p>
          We handle every step of bringing a book to life: professional editing and proofreading,
          cover and interior design, illustration, ISBN assignment, high-quality printing and binding,
          eBook conversion, and distribution and listing on Amazon and other stores. You can take
          our guided Expert Publishing path or self-publish with full control.
        </p>

        <h2>Choose your journey</h2>
        <p>
          Every book is different. We offer dedicated journeys for novels and fiction, memoirs and
          family histories, children's picture books, non-fiction and academic titles, coffee-table
          and art books, and business and company stories. Explore them at
          <a href="https://cursivepublishing.com/journeys">cursivepublishing.com/journeys</a>.
        </p>

        <h2>Plans &amp; instant estimate</h2>
        <p>
          Choose from our Starter, Professional, Excellence, and Elite publishing plans, with
          royalties up to 60%. Not sure where to start? Answer a few questions for an instant
          estimate of budget and timeline at
          <a href="https://cursivepublishing.com/planner">cursivepublishing.com/planner</a>, or see
          full pricing at <a href="https://cursivepublishing.com/plans">cursivepublishing.com/plans</a>.
        </p>

        <h2>Why authors choose Cursive</h2>
        <p>
          Transparent pricing, generous royalties, a dedicated project workspace where you approve
          every proof, and a team that treats your book like it's our own. From manuscript to
          published title, you always know exactly what stage your book is at.
        </p>
